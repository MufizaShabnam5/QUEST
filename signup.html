<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
     <link rel="stylesheet" href="signup.css">
 <link rel="icon" type="image/png" href="../Images/logo.png">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<button id="modeBtn" class="mode-toggle">
  <i class="fa fa-moon"></i>
</button>

<div class="signup-card">
    
    <a href="index.html" class="logo-text">
    <img src="../Images/logo.png" alt="Escape Quest Logo" class="logo-img">
    Escape Quest
  </a>

<h2>Create Your Escape Account</h2>

<form>

<div class="input-group">
<input type="text" required>
<label>Full Name</label>
</div>

<div class="input-group">
<input type="email" required>
<label>Email Address</label>
</div>

<div class="input-group">
<input type="password" id="password" required>
<label>Password</label>
<i class="fa fa-eye toggle-pass" onclick="togglePassword()"></i>

<div class="strength">
<span id="strength-bar"></span>
</div>
</div>

<div class="input-group">
<input type="password" required>
<label>Confirm Password</label>
</div>

<button class="signup-btn">Create Account</button>

</form>

<div class="social">
<button><i class="fab fa-google"></i> Google</button>
<button><i class="fab fa-facebook"></i> Facebook</button>
</div>

<div class="login">
Already have an account? <a href="login.html">Login</a>
</div>

</div>
<script>
    // Toggle Password
function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}
}

// Password Strength
const password = document.getElementById("password");
const bar = document.getElementById("strength-bar");

password.addEventListener("input", function(){

let val = password.value;
let strength = 0;

if(val.length > 5) strength++;
if(val.match(/[A-Z]/)) strength++;
if(val.match(/[0-9]/)) strength++;
if(val.match(/[^A-Za-z0-9]/)) strength++;

if(strength === 1){
bar.style.width = "25%";
bar.style.background = "red";
}
else if(strength === 2){
bar.style.width = "50%";
bar.style.background = "orange";
}
else if(strength === 3){
bar.style.width = "75%";
bar.style.background = "yellowgreen";
}
else if(strength === 4){
bar.style.width = "100%";
bar.style.background = "green";
}
else{
bar.style.width = "0%";
}

});

const modeBtn = document.getElementById("modeBtn");
const icon = modeBtn.querySelector("i");

// Load saved mode
const savedMode = localStorage.getItem("mode");

if(savedMode === "dark"){
    document.body.classList.add("dark");
    icon.classList.replace("fa-moon","fa-sun");
}

// Toggle mode
modeBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        icon.classList.replace("fa-moon","fa-sun");
        localStorage.setItem("mode","dark");
    }else{
        icon.classList.replace("fa-sun","fa-moon");
        localStorage.setItem("mode","light");
    }

});
</script>

</body>
</html>
