<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
     <link rel="stylesheet" href="signup.css">
 <link rel="icon" type="image/png" href="../Images/logo.png">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<button id="modeBtn" class="mode-toggle">
<i class="fa fa-moon"></i>
</button>

<div class="login-card">

<div class="success-box" id="successBox">
✔ Account Created
</div>


<a href="index.html" class="logo-text">
<img src="../Images/logo.png" class="logo-img">
Escape Quest
</a>

<h2>Create Account 🚀</h2>
<p class="subtitle">Start your journey with us</p>

<form>


<div class="input-group">
<input type="text" id="name" required>
<label>Full Name</label>
</div>


<div class="input-group">
<input type="email" id="email" required>
<label>Email Address</label>
</div>


<div class="input-group password-group">
<input type="password" id="password" required>
<label>Password</label>
<span class="eye-icon" onclick="togglePassword('password')">
<i class="fa fa-eye"></i>
</span>
</div>


<div class="input-group password-group">
<input type="password" id="confirmPassword" required>
<label>Confirm Password</label>
<span class="eye-icon" onclick="togglePassword('confirmPassword')">
<i class="fa fa-eye"></i>
</span>
</div>


<div class="options">
<label class="remember">
<input type="checkbox" id="terms">
<span class="checkmark"></span>
Accept Terms
</label>
</div>


<button class="login-btn" id="registerBtn">
<span class="btn-text">Register</span>
<span class="loader"></span>
</button>

</form>

<div class="signup-link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>
<script>
    const registerBtn = document.getElementById("registerBtn");
const successBox = document.getElementById("successBox");

const nameField = document.getElementById("name");
const email = document.getElementById("email");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const terms = document.getElementById("terms");


registerBtn.onclick = (e) => {
e.preventDefault();

let valid = true;


if(nameField.value.trim() === ""){
nameField.classList.add("shake");
valid = false;
}

if(email.value.trim() === ""){
email.classList.add("shake");
valid = false;
}

if(password.value.trim() === ""){
password.classList.add("shake");
valid = false;
}

if(confirmPassword.value.trim() === ""){
confirmPassword.classList.add("shake");
valid = false;
}


if(password.value !== confirmPassword.value){
password.classList.add("shake");
confirmPassword.classList.add("shake");
valid = false;
}


if(!terms.checked){
alert("Please accept terms");
valid = false;
}

setTimeout(()=>{
[nameField,email,password,confirmPassword].forEach(i=>i.classList.remove("shake"));
},400);

if(!valid) return;


registerBtn.classList.add("loading");

setTimeout(()=>{

registerBtn.classList.remove("loading");


successBox.classList.add("show");


setTimeout(()=>{
window.location.href="login.html";
},1500);

},2000);

};


function togglePassword(id){
const input = document.getElementById(id);
const icon = input.parentElement.querySelector("i");

if(input.type === "password"){
input.type = "text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
input.type = "password";
icon.classList.replace("fa-eye-slash","fa-eye");
}
}


const modeBtn = document.getElementById("modeBtn");
const icon = modeBtn.querySelector("i");

modeBtn.onclick = () => {
document.body.classList.toggle("dark");
icon.classList.toggle("fa-moon");
icon.classList.toggle("fa-sun");
};
</script>

</body>
</html>
