<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
 <link rel="icon" type="image/png" href="../Images/logo.png">
<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
<button id="modeBtn" class="mode-toggle">
  <i class="fa fa-moon"></i>
</button>
<div class="login-card">
<a href="index.html" class="logo-text">
    <img src="../Images/logo.png" alt="Escape Quest Logo" class="logo-img">
    Escape Quest
  </a>
<h2>Welcome Back</h2>

<form>

<div class="input-group">
<input type="email" required>
<label>Email Address</label>
</div>

<div class="input-group">
<input type="password" id="password" required>
<label>Password</label>
<i class="fa fa-eye toggle-pass" onclick="togglePassword()"></i>
</div>

<button class="login-btn">Login</button>

</form>

<div class="social">
<button><i class="fab fa-google"></i> Google</button>
<button><i class="fab fa-facebook"></i> Facebook</button>
</div>

<div class="signup-link">
Don't have an account? <a href="signup.html">Signup</a>
</div>

</div>
<script>
    // Toggle Password
function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}
}


const modeBtn = document.getElementById("modeBtn");
const icon = modeBtn.querySelector("i");

// Load saved mode
const savedMode = localStorage.getItem("mode");

if(savedMode === "dark"){
    document.body.classList.add("dark");
    icon.classList.replace("fa-moon","fa-sun");
}

// Toggle mode
modeBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        icon.classList.replace("fa-moon","fa-sun");
        localStorage.setItem("mode","dark");
    }else{
        icon.classList.replace("fa-sun","fa-moon");
        localStorage.setItem("mode","light");
    }

});
</script>

</body>
</html>
